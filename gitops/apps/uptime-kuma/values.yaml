ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: uptime-kuma.example.com
      paths:
        - path: /
          pathType: Prefix
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
