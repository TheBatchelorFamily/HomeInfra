apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: "Home Infrastructure"
    description: "Central dashboard for home infrastructure and services"
    theme: dark
    color: blue
    language: en

    layout:
      Home:
        style: row
        columns: 3

    titleToggle: true
    search: true
    themeToggle: true
    message:
      style: info
      title: "Welcome!"
      content: "This is your central dashboard for all home infrastructure services."

  bckground: |
    image: https://raw.githubusercontent.com/TheBatchelorFamily/Megans_Portfolio_Website/refs/heads/main/website/assets/img/waterfall-image.jpeg
    opacity: 0.5

  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/TheBatchelorFamily
        - Docker Hub:
            - abbr: DH
              href: https://hub.docker.com
        - Kubernetes Docs:
            - abbr: K8s
              href: https://kubernetes.io/docs/
        - Portfolio site:
            - abbr: PF
              href: https://itsmeganificent.com

    - Infrastructure:
        - Traefik Hub:
            - abbr: TF
              href: https://traefik.io/hub/
        - MetalLB:
            - abbr: LB
              href: https://metallb.universe.tf/
        - Longhorn:
            - abbr: LH
              href: https://longhorn.io/

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: https://argocd.batchelorparty.com
            description: GitOps continuous delivery
            icon: argo-cd
        - Uptime Kuma:
            href: http://kuma.batchelorparty.com
            description: Service monitoring and alerting
            icon: uptime-kuma
        - Longhorn:
            href: https://longhorn.batchelorparty.com
            description: Distributed block storage
            icon: longhorn
        - MetalLB:
            description: Load balancer for bare metal
            icon: metallb
        - Kube1: 
            href: https://kube1.lan:9090
            description: Cockpit dashboard
            icon: alma-linux
        - Kube2: 
            href: https://kube2.lan:9090
            description: Cockpit dashboard
            icon: alma-linux
        - Kube3: 
            href: https://kube3.lan:9090
            description: Cockpit dashboard
            icon: alma-linux

    - Smart Home:
        - Home Assistant:
            href: https://ha.batchelorparty.com
            description: Home automation platform
            icon: home-assistant
        - Home Box:
            href: http://box.batchelorparty.com
            description: Home inventory and organization system
            icon: homebox

    - Media & Entertainment:
        - Plex:
            href: https://plex.batchelorparty.com
            description: Media streaming server
            icon: plex

    - Development:
        - GitHub:
            href: https://github.com/TheBatchelorFamily
            description: Family code repositories
            icon: github
        - Portainer:
            href: https://portainer.batchelorparty.com
            description: Docker container management
            icon: portainer

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        disk: /
        cputemp: false
        uptime: true
        units: imperial
        tempmin: 0
        tempmax: 100
        refresh: 10000

    - search:
        provider: duckduckgo
        target: _blank

    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true
