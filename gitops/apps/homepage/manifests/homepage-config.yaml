apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: "Home Infrastructure"
    description: "Central dashboard for home infrastructure and services"
    theme: dark
    color: slate
    language: en

    background:
      image: https://raw.githubusercontent.com/TheBatchelorFamily/Megans_Portfolio_Website/refs/heads/main/website/assets/img/waterfall-image.jpeg
      opacity: 30

    cardBlur: md

    layout:
      Home:
        style: row
        columns: 3

    titleToggle: true
    search: true
    themeToggle: true
    message:
      style: info
      title: "Welcome!"
      content: "This is your central dashboard for all home infrastructure services."

  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/TheBatchelorFamily
        - kubesearch:
            - abbr: KS
              href: https://kubesearch.dev/

    - Useful Links:

# Icons are sourced from https://github.com/homarr-labs/dashboard-icons/tree/main/png
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: https://argo.batchelorparty.com
            description: GitOps continuous delivery
            icon: argo-cd
        - Uptime Kuma:
            href: http://kuma.batchelorparty.com
            description: Service monitoring and alerting
            icon: uptime-kuma
        - Longhorn:
            href: http://longhorn.batchelorparty.com
            description: Distributed block storage
            icon: longhorn
        - MetalLB:
            description: Load balancer for bare metal
            icon: metallb
        - TrueNas:
            href: http://batchflix.home
            description: Network-attached storage
            icon: truenas-scale
        - Omada Controller:
            href: https://omada.home/
            description: Network management controller
            icon: omada
        - Headlamp: 
            href: http://headlamp.batchelorparty.com
            description: Kubernetes dashboard
            icon: headlamp
        - Kube1: 
            href: https://kube1.lan:9090
            description: Cockpit dashboard
            icon: alma-linux
        - Kube2: 
            href: https://kube2.lan:9090
            description: Cockpit dashboard
            icon: alma-linux
        - Kube3: 
            href: https://kube3.lan:9090
            description: Cockpit dashboard
            icon: alma-linux

    - Smart Home:
        - Home Assistant:
            href: http://ha.batchelorparty.com
            description: Home automation platform
            icon: home-assistant
        - Home Box:
            href: http://box.batchelorparty.com
            description: Home inventory and organization system
            icon: homebox

    - Media & Entertainment:
        - Plex:
            href: http://plex.batchelorparty.com
            description: Media streaming server
            icon: plex

    - Development:
        - GitHub:
            href: https://github.com/TheBatchelorFamily
            description: Family code repositories
            icon: github
        - Portfolio site:
            href: https://itsmeganificent.com
            description: Megan's portfolio website
            icon: https://raw.githubusercontent.com/TheBatchelorFamily/Megans_Portfolio_Website/refs/heads/main/website/assets/img/favicon.png

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        disk: /
        cputemp: false
        uptime: true
        units: imperial
        tempmin: 0
        tempmax: 100
        refresh: 10000

    - search:
        provider: duckduckgo
        target: _blank

    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true
