---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-image-updater
  namespace: argocd

spec:
  project: infra

  sources:
    - repoURL: https://argoproject.github.io/argo-helm
      chart: argocd-image-updater
      targetRevision: 1.*

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
