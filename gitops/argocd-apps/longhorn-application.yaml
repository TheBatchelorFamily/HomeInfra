---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.11.1"
      helm:
        skipCrds: false
        parameters:
          - name: "enableHooks"
            value: "false"
        valueFiles:
          - $HomeInfra/gitops/apps/longhorn/values.yaml

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      ref: HomeInfra

  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
      - FailOnSharedResource=false
