---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-plugin
  namespace: argocd

spec:
  project: apps

  sources:
    - repoURL: https://intel.github.io/helm-charts/
      chart: intel-device-plugins-operator
      targetRevision: 0.35.*
      helm:
        valueFiles:
          - $HomeInfra/gitops/apps/intel-plugin/values.yaml

    - repoURL: https://intel.github.io/helm-charts/
      chart: intel-device-plugins-gpu
      targetRevision: 0.35.*
      helm:
        valueFiles:
          - $HomeInfra/gitops/apps/intel-plugin/values.yaml

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      ref: HomeInfra

  destination:
    server: https://kubernetes.default.svc
    namespace: intel-plugins

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
