---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://raw.githubusercontent.com/plexinc/pms-docker/gh-pages
      chart: plex-media-server
      targetRevision: 1.5.0
      helm:
        valueFiles:
          - $HomeInfra/gitops/apps/plex/values.yaml

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      ref: HomeInfra

  destination:
    server: https://kubernetes.default.svc
    namespace: plex

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
