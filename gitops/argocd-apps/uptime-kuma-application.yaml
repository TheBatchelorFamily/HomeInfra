apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: ghcr.io/helmforgedev/helm
      chart: uptime-kuma
      targetRevision: 1.3.5
      helm:
        valueFiles:
          - $HomeInfra/gitops/apps/uptime-kuma/values.yaml

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      ref: HomeInfra

  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
