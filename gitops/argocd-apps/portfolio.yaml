---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd

spec:
  project: apps

  source:
    repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
    targetRevision: main
    path: gitops/apps/portfolio/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true