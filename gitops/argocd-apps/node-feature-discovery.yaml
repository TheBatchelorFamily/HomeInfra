---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-feature-discovery
  namespace: argocd

spec:
  project: apps

  sources:
    - repoURL: oci://registry.k8s.io/nfd/charts/node-feature-discovery
      chart: node-feature-discovery
      targetRevision: 0.18.*

  destination:
    server: https://kubernetes.default.svc
    namespace: node-feature-discovery

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
