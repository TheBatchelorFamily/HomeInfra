---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
spec:
  project: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  sources:
    - repoURL: https://small-hack.github.io/home-assistant-chart
      chart: home-assistant
      targetRevision: "1.11.*"
      helm:
        valueFiles:
          - $HomeInfra/gitops/apps/home-assistant/values.yaml

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      ref: HomeInfra

    - repoURL: https://github.com/TheBatchelorFamily/HomeInfra.git
      targetRevision: main
      path: gitops/apps/home-assistant/manifests

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
