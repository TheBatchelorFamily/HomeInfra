---
- name: Copy K3s service file
  template:
    src: "../../templates/k3s.service.j2"
    dest: "{{ systemd_dir }}/k3s-node.service"
    owner: root
    group: root
    mode: 0755
  notify: restart k3s-node

- name: Enable and check K3s service
  systemd:
    name: k3s-node
    daemon_reload: yes
    state: started
    enabled: yes  

- name: Trust the Flannel/CNI interfaces wildcard
  command: "firewall-cmd --permanent --zone=trusted --add-interface={{ item }}"
  loop:
    - "flannel+"
    - "cni+"
  changed_when: true

- name: Apply wildcard rules immediately
  command: firewall-cmd --reload
  changed_when: true
