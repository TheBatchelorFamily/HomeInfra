---
- name: Install Base Packages
  yum:
    name:
      - container-selinux
      - selinux-policy-base
      - python3-pip
      - firewalld
    state: present
  when: ansible_distribution in ['CentOS', 'Red Hat Enterprise Linux', 'Fedora', 'AlmaLinux']

- name: Remove legacy iptables-services package
  yum:
    name: iptables-services
    state: absent

- name: Set SELinux to enabled state
  selinux:
    policy: targeted
    state: enforcing
  when: ansible_distribution in ['CentOS', 'Red Hat Enterprise Linux', 'Fedora', 'AlmaLinux']

- name: Ensure Flannel runtime directory persists across reboots
  copy:
    dest: /etc/tmpfiles.d/k3s-flannel.conf
    content: |
      d /run/flannel 0755 root root -
    mode: '0644'

- name: Ensure Kubernetes sysctl settings
  copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Force iptables to use nftables backend
  command: update-alternatives --set iptables /usr/sbin/iptables-nft
  changed_when: false
  failed_when: false

- name: Force ip6tables to use nftables backend
  command: update-alternatives --set ip6tables /usr/sbin/ip6tables-nft
  changed_when: false
  failed_when: false
  when: ansible_distribution in ['CentOS', 'Red Hat Enterprise Linux', 'AlmaLinux']

- name: Force arptables to use nftables backend
  command: update-alternatives --set arptables /usr/sbin/arptables-nft
  changed_when: false
  failed_when: false

- name: Force ebtables to use nftables backend
  command: update-alternatives --set ebtables /usr/sbin/ebtables-nft
  changed_when: false
  failed_when: false

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: yes

- name: Enable IPv6 forwarding
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    state: present
    reload: yes
  when: (ansible_all_ipv6_addresses | default([]) | length) > 0

- name: Add br_netfilter to modules-load
  copy:
    content: "br_netfilter"
    dest: /etc/modules-load.d/br_netfilter.conf
    mode: "0644"

- name: Load br_netfilter
  modprobe:
    name: br_netfilter
    state: present

- name: Add /usr/local/bin to sudo secure_path
  lineinfile:
    line: 'Defaults    secure_path = /sbin:/bin:/usr/sbin:/usr/bin:/usr/local/bin'
    regexp: "Defaults(\\s)*secure_path(\\s)*="
    state: present
    path: /etc/sudoers
    validate: 'visudo -cf %s'

- name: Install pip3 for Python
  package:
    name: python3-pip
    state: present

- name: Install Python kubernetes libraries
  pip:
    name: 
      - kubernetes
      - pyyaml
    state: present

- name: Ensure Firewalld is running
  systemd:
    name: firewalld
    state: started
    enabled: yes

- name: Ensure trusted zone exists
  firewalld:
    zone: trusted
    state: present
    permanent: yes

- name: Remove K3s CIDRs from default zone to prevent conflicts
  firewalld:
    zone: "{{ zone_default }}"
    source: "{{ item }}"
    state: disabled
    permanent: yes
    immediate: yes
  loop:
    - "10.42.0.0/16"
    - "10.43.0.0/16"
  failed_when: false # Ignore if they weren't there

- name: Configure Trusted Zone for K3s
  firewalld:
    zone: trusted
    source: "{{ item }}"
    state: enabled
    permanent: yes
    immediate: yes
  loop:
    - "10.42.0.0/16" # Pod CIDR
    - "10.43.0.0/16" # Service CIDR
  register: zone_result
  # Ignore the error if the source is already bound to the zone
  failed_when: 
    - zone_result.failed is defined 
    - zone_result.failed 
    - "'ZONE_CONFLICT' not in zone_result.msg"

- name: Allow all traffic from Pod/Service CIDRs (Fedora 41 Rich Rules)
  firewalld:
    permanent: yes
    immediate: yes
    rich_rule: 'rule family="ipv4" source address="{{ item }}" accept'
    zone: trusted
    state: enabled
  loop:
    - "10.42.0.0/16"
    - "10.43.0.0/16"

- name: Set Trusted Zone target to ACCEPT
  command: firewall-cmd --permanent --zone=trusted --set-target=ACCEPT
  changed_when: true

- name: Open Required Ports in Default Zone
  firewalld:
    immediate: yes
    permanent: yes
    port: "{{ item.port }}/{{ item.proto }}"
    state: enabled
    zone: "{{ zone_default | default('public') }}"
  loop:
    - { port: "22", proto: "tcp" }
    - { port: "80", proto: "tcp" }
    - { port: "443", proto: "tcp" }
    - { port: "53", proto: "udp" }
    - { port: "53", proto: "tcp" }
    - { port: "6443", proto: "tcp" } # API Server
    - { port: "8081", proto: "tcp" } # Argo Repo Server
    - { port: "10250", proto: "tcp" } # Kubelet
    - { port: "8472", proto: "udp" } # Flannel VXLAN
    - { port: "30000-32767", proto: "tcp" }
    - { port: "30000-32767", proto: "udp" }

- name: Enable Masquerading
  firewalld:
    masquerade: yes
    state: enabled
    permanent: yes
    immediate: yes
    zone: "{{ item }}"
  loop: ["{{ zone_default | default('public') }}", "trusted"]

- name: Ensure Firewalld allows masquerading for the pod network
  firewalld:
    permanent: yes
    immediate: yes
    zone: public
    rich_rule: 'rule family="ipv4" source address="10.42.0.0/16" masquerade'
    state: enabled

- name: Add overlay to modules-load
  copy:
    content: "overlay"
    dest: /etc/modules-load.d/overlay.conf
    mode: "0644"

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Force immediate firewall reload
  command: firewall-cmd --reload
  changed_when: true

- name: Restart firewalld for proper nftables synchronization (AlmaLinux)
  systemd:
    name: firewalld
    state: restarted
